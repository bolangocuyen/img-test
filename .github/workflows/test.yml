name: Termux Docker Image Verification

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test-images:
    name: Verify ${{ matrix.image-name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package-manager: apt
            image-name: excedrin/termux-docker
          - package-manager: pacman
            image-name: excedrin/termux-docker-pacman

    steps:
      - name: Pull Image
        run: docker pull ${{ matrix.image-name }}:latest

      - name: Validate Rootfs Structure
        run: |
          docker run --rm ${{ matrix.image-name }}:latest sh -c '
            set -e
            echo "--- Checking Core Structure ---"
            [ -d "/data/data/com.termux/files/usr" ] && echo "✅ Prefix OK"
            [ -L "/etc/passwd" ] && echo "✅ Symlink OK"
            [ -f "/entrypoint.sh" ] && echo "✅ Entrypoint OK"
          '

      - name: Search for NDK and LLVM
        run: |
          ls -a
          ls -a ..
          echo "Searching for Native Development tools in ${{ matrix.image-name }}..."
          docker run --rm ${{ matrix.image-name }}:latest sh -c '
            echo "--- Checking for LLVM / Clang ---"
            if [ -f "/data/data/com.termux/files/usr/bin/clang" ]; then
              echo "✅ Clang found at: $(which clang)"
              clang --version | head -n 1
            else
              echo "ℹ️ Clang/LLVM binary not found in minimal bootstrap."
            fi

            echo "--- Checking for NDK / Android Headers ---"
            if [ -d "/data/data/com.termux/files/usr/include/android" ]; then
              echo "✅ Android NDK headers found in include directory."
              ls /data/data/com.termux/files/usr/include/android | head -n 5
            else
              echo "ℹ️ NDK headers not found."
            fi

            echo "--- Checking for libandroid-stub (NDK Helper) ---"
            if ls /data/data/com.termux/files/usr/lib/libandroid-stub* 1> /dev/null 2>&1; then
              echo "✅ libandroid-stub found."
            else
              echo "ℹ️ libandroid-stub not found."
            fi

            echo "--- Package Manager Query ---"
            echo "Installed packages related to LLVM/NDK:"
            if [ -f "/data/data/com.termux/files/usr/bin/apt" ]; then
              dpkg -l | grep -E "llvm|ndk|clang|binutils" || echo "No packages found via dpkg."
            else
              pacman -Qs "llvm|ndk|clang|binutils" || echo "No packages found via pacman."
            fi
          '

      - name: Verify Package Manager Functionality
        run: |
          if [[ "${{ matrix.package-manager }}" == "pacman" ]]; then
            docker run --rm ${{ matrix.image-name }}:latest pacman --version
          else
            docker run --rm ${{ matrix.image-name }}:latest apt --version
          fi

      - name: Verify User Context (UID 1000)
        run: |
          docker run --rm --user system ${{ matrix.image-name }}:latest whoami | grep system
